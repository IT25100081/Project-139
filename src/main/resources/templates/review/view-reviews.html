<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews - Beauty Salon</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/review-style.css}">
</head>
<body>
    <div class="container review-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title mb-0 border-0">Customer Reviews</h2>
            <a th:href="@{/reviews/submit}" class="btn btn-primary">Write a Review</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Average Rating Section -->
        <div class="avg-rating-box">
            <h4>Overall Rating</h4>
            <div class="avg-rating-number" th:text="${averageRating}">4.5</div>
            <div class="star-display mt-2">
                <!-- Simple representation. Can be enhanced with JS for fractional stars -->
                <i class="fas fa-star" th:each="i : ${#numbers.sequence(1, 5)}" 
                   th:classappend="${i <= averageRating} ? '' : 'empty-star'"></i>
            </div>
            <p class="text-muted mt-2" th:text="${reviews.size()} + ' total reviews'"></p>
        </div>

        <!-- Filters -->
        <div class="card mb-4">
            <div class="card-body bg-light">
                <form th:action="@{/reviews}" method="get" class="row g-3 align-items-center">
                    <div class="col-auto">
                        <label class="col-form-label">Filter by Service ID:</label>
                    </div>
                    <div class="col-auto">
                        <input type="text" name="serviceId" class="form-control" placeholder="e.g. S001" th:value="${param.serviceId}">
                    </div>
                    <div class="col-auto">
                        <label class="col-form-label">Filter by Rating:</label>
                    </div>
                    <div class="col-auto">
                        <select name="rating" class="form-select">
                            <option value="">All Ratings</option>
                            <option value="5" th:selected="${param.rating == '5'}">5 Stars</option>
                            <option value="4" th:selected="${param.rating == '4'}">4 Stars</option>
                            <option value="3" th:selected="${param.rating == '3'}">3 Stars</option>
                            <option value="2" th:selected="${param.rating == '2'}">2 Stars</option>
                            <option value="1" th:selected="${param.rating == '1'}">1 Star</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-outline-primary">Apply Filters</button>
                        <a th:href="@{/reviews}" class="btn btn-outline-secondary">Clear</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Review List -->
        <div class="reviews-list">
            <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-5">
                <h5 class="text-muted">No reviews found matching your criteria.</h5>
            </div>
            
            <div th:each="review : ${reviews}" class="review-card">
                <div class="review-header">
                    <div>
                        <span class="reviewer-name" th:text="${review.customerName}">John Doe</span>
                        <span class="review-badge badge-verified" th:text="${review.getReviewType()}">Verified</span>
                        <span class="ms-2 text-muted" style="font-size: 0.85rem;" th:text="'Service: ' + ${review.serviceId}"></span>
                    </div>
                    <span class="review-date" th:text="${review.date}">2026-05-15</span>
                </div>
                
                <div class="star-display mb-2">
                    <i class="fas fa-star" th:each="i : ${#numbers.sequence(1, 5)}" 
                       th:classappend="${i <= review.starRating} ? '' : 'empty-star'"></i>
                </div>
                
                <div class="review-comment" th:text="${review.reviewComment}">
                    This is an amazing service! Highly recommended.
                </div>
                
                <!-- Edit button for demo purposes (usually would be restricted to logged in user) -->
                <div class="mt-3 text-end">
                    <a th:href="@{/reviews/edit/{id}(id=${review.reviewId})}" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
