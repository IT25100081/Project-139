<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Submit Review - Beauty Salon</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/review-style.css}">
</head>
<body>
    <div class="container review-container">
        <h2 class="page-title">Rate Your Experience</h2>
        
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/reviews/submit}" th:object="${review}" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Customer ID</label>
                    <input type="text" class="form-control" th:field="*{customerId}" required placeholder="e.g. C001">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Customer Name</label>
                    <input type="text" class="form-control" th:field="*{customerName}" required placeholder="Your Name">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Service ID</label>
                <input type="text" class="form-control" th:field="*{serviceId}" required placeholder="e.g. S001">
            </div>

            <div class="mb-3 text-center">
                <label class="form-label d-block text-start">Rating</label>
                <div class="rating-group">
                    <input type="radio" id="star5" th:field="*{starRating}" value="5" />
                    <label for="star5" title="5 stars"><i class="fas fa-star"></i></label>
                    
                    <input type="radio" id="star4" th:field="*{starRating}" value="4" />
                    <label for="star4" title="4 stars"><i class="fas fa-star"></i></label>
                    
                    <input type="radio" id="star3" th:field="*{starRating}" value="3" />
                    <label for="star3" title="3 stars"><i class="fas fa-star"></i></label>
                    
                    <input type="radio" id="star2" th:field="*{starRating}" value="2" />
                    <label for="star2" title="2 stars"><i class="fas fa-star"></i></label>
                    
                    <input type="radio" id="star1" th:field="*{starRating}" value="1" required />
                    <label for="star1" title="1 star"><i class="fas fa-star"></i></label>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Review Comment</label>
                <textarea class="form-control" th:field="*{reviewComment}" rows="4" minlength="5" required placeholder="Tell us about your experience (minimum 5 characters)"></textarea>
            </div>

            <div class="d-flex justify-content-between">
                <a th:href="@{/reviews}" class="btn btn-outline-secondary">Back to Reviews</a>
                <button type="submit" class="btn btn-primary">Submit Review</button>
            </div>
        </form>
    </div>
</body>
</html>
