<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Review Moderation - Beauty Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/review-style.css}">
    <style>
        .table-moderation {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .status-Pending { background-color: #fff3cd; color: #856404; }
        .status-Approved { background-color: #d4edda; color: #155724; }
        .status-Removed { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-shield-alt text-primary"></i> Review Moderation Panel</h2>
            <a th:href="@{/reviews}" class="btn btn-outline-secondary">View Public Site</a>
        </div>
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="table-responsive table-moderation">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Service</th>
                        <th>Rating</th>
                        <th>Comment</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="review : ${reviews}">
                        <td th:text="${review.reviewId}"></td>
                        <td>
                            <div th:text="${review.customerName}" class="fw-bold"></div>
                            <small class="text-muted" th:text="${review.customerId}"></small>
                        </td>
                        <td th:text="${review.serviceId}"></td>
                        <td>
                            <span class="text-warning"><i class="fas fa-star"></i></span>
                            <span th:text="${review.starRating}"></span>/5
                        </td>
                        <td style="max-width: 250px;" class="text-truncate" th:title="${review.reviewComment}" th:text="${review.reviewComment}"></td>
                        <td th:text="${review.date}"></td>
                        <td>
                            <span th:class="'status-badge status-' + ${review.reviewStatus}" th:text="${review.reviewStatus}"></span>
                        </td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/reviews/admin/status(id=${review.reviewId}, status='Approved')}" class="btn btn-success" th:classappend="${review.reviewStatus == 'Approved'} ? 'disabled' : ''" title="Approve">
                                    <i class="fas fa-check"></i>
                                </a>
                                <a th:href="@{/reviews/admin/status(id=${review.reviewId}, status='Pending')}" class="btn btn-warning" th:classappend="${review.reviewStatus == 'Pending'} ? 'disabled' : ''" title="Set Pending">
                                    <i class="fas fa-clock"></i>
                                </a>
                                <a th:href="@{/reviews/admin/status(id=${review.reviewId}, status='Removed')}" class="btn btn-danger" th:classappend="${review.reviewStatus == 'Removed'} ? 'disabled' : ''" title="Remove">
                                    <i class="fas fa-times"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reviews)}">
                        <td colspan="8" class="text-center py-4 text-muted">No reviews found in the system.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
