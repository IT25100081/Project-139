<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Review - Beauty Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/review-style.css}">
</head>
<body>
    <div class="container review-container">
        <h2 class="page-title">Edit Your Review</h2>
        
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/reviews/edit}" th:object="${review}" method="post">
            <input type="hidden" th:field="*{reviewId}" />
            <input type="hidden" th:field="*{customerId}" />
            <input type="hidden" th:field="*{serviceId}" />
            <input type="hidden" th:field="*{customerName}" />
            <input type="hidden" th:field="*{date}" />
            <input type="hidden" th:field="*{reviewStatus}" />

            <div class="mb-3 p-3 bg-light rounded">
                <p class="mb-1"><strong>Service:</strong> <span th:text="*{serviceId}"></span></p>
                <p class="mb-0"><strong>Review by:</strong> <span th:text="*{customerName}"></span></p>
            </div>

            <div class="mb-3 text-center">
                <label class="form-label d-block text-start">Update Rating</label>
                <div class="rating-group">
                    <input type="radio" id="star5" th:field="*{starRating}" value="5" />
                    <label for="star5" title="5 stars"><i class="fas fa-star"></i></label>
                    
                    <input type="radio" id="star4" th:field="*{starRating}" value="4" />
                    <label for="star4" title="4 stars"><i class="fas fa-star"></i></label>
                    
                    <input type="radio" id="star3" th:field="*{starRating}" value="3" />
                    <label for="star3" title="3 stars"><i class="fas fa-star"></i></label>
                    
                    <input type="radio" id="star2" th:field="*{starRating}" value="2" />
                    <label for="star2" title="2 stars"><i class="fas fa-star"></i></label>
                    
                    <input type="radio" id="star1" th:field="*{starRating}" value="1" required />
                    <label for="star1" title="1 star"><i class="fas fa-star"></i></label>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Update Comment</label>
                <textarea class="form-control" th:field="*{reviewComment}" rows="4" minlength="5" required></textarea>
            </div>

            <div class="d-flex justify-content-between">
                <div>
                    <a th:href="@{/reviews}" class="btn btn-outline-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
                <a th:href="@{/reviews/delete/{id}(id=${review.reviewId})}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this review?')">
                    <i class="fas fa-trash"></i> Delete Review
                </a>
            </div>
        </form>
    </div>
</body>
</html>
