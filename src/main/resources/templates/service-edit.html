<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/admin-layout}">
<head>
    <title>Edit Service</title>
</head>
<body>

<div layout:fragment="content">
    
    <div class="card" style="max-width: 800px; margin: 0 auto;">
        <div class="card-header">
            <h3>Edit Service</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/services/edit/{id}(id=${serviceDTO.serviceId})}" th:object="${serviceDTO}" method="post" enctype="multipart/form-data">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Service ID</label>
                        <input type="text" class="form-control" th:field="*{serviceId}" readonly>
                        <small class="text-muted">Service ID cannot be changed.</small>
                    </div>
                    
                    <div class="form-group">
                        <label>Service Name</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select class="form-control" th:field="*{category}">
                            <option value="Hair">Hair</option>
                            <option value="Skin">Skin</option>
                            <option value="Nail">Nail</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Duration (minutes)</label>
                        <input type="number" class="form-control" th:field="*{duration}" required min="1">
                    </div>

                    <div class="form-group form-full">
                        <label>Price (LKR)</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{price}" required min="0">
                    </div>
                    
                    <div class="form-group form-full">
                        <label>Change Image</label>
                        <div class="dropzone" id="imageDropzone"
                          onclick="document.getElementById('imageFile').click()"
                          ondragover="event.preventDefault();this.style.borderColor='var(--rose)'"
                          ondragleave="this.style.borderColor='var(--border2)'"
                          ondrop="handleDrop(event)">
                          <div id="dropzoneContent" th:style="${serviceDTO.imageUrl != null and serviceDTO.imageUrl != '' ? 'display:none;' : 'display:block;'}">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Click or drag & drop an image here</p>
                            <small>JPG, PNG, WEBP · Max 5MB</small>
                          </div>
                          
                          <img id="imagePreview" 
                               th:src="@{${serviceDTO.imageUrl != null ? serviceDTO.imageUrl : ''}}" 
                               alt="Current Image" 
                               th:style="${serviceDTO.imageUrl != null and serviceDTO.imageUrl != '' ? 'display:block;max-height:150px;border-radius:8px;margin:0 auto;object-fit:cover;' : 'display:none;max-height:150px;border-radius:8px;margin:0 auto;object-fit:cover;'}">
                        </div>
                        <input type="file" id="imageFile" name="imageFile" accept="image/*" style="display:none" onchange="previewImage(this)">
                    </div>
                </div>

                <div class="btn-group mt-3" style="justify-content: flex-end; width: 100%;">
                    <a th:href="@{/services}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-rose"><i class="fas fa-save"></i> Update Service</button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script>
function previewImage(input){
  if(!input.files||!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('imagePreview').src=e.target.result;
    document.getElementById('imagePreview').style.display='block';
    document.getElementById('dropzoneContent').style.display='none';
  };
  reader.readAsDataURL(input.files[0]);
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('imageDropzone').style.borderColor='var(--border2)';
  const file=e.dataTransfer.files[0];
  if(file&&file.type.startsWith('image/')){
    const dt=new DataTransfer(); dt.items.add(file);
    document.getElementById('imageFile').files=dt.files;
    previewImage(document.getElementById('imageFile'));
  }
}
</script>
</th:block>

</body>
</html>
