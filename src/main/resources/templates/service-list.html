<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/admin-layout}">
<head>
    <title>Manage Services</title>
</head>
<body>

<div layout:fragment="content">

    <!-- Stats Row -->
    <div class="svc-stats-row">
      <div class="svc-stat">
        <div class="svc-stat-icon"><i class="fas fa-layer-group"></i></div>
        <div>
          <div class="svc-stat-label">Total Services</div>
          <div class="svc-stat-value" th:text="${services.size()}">0</div>
        </div>
      </div>
      <div class="svc-stat">
        <div class="svc-stat-icon" style="background:var(--gold-soft);color:var(--gold)"><i class="fas fa-tag"></i></div>
        <div>
          <div class="svc-stat-label">Services</div>
          <div class="svc-stat-value" style="font-size:1.2rem;">Available</div>
        </div>
      </div>
      <div class="svc-stat">
        <div class="svc-stat-icon" style="background:var(--green-soft);color:var(--green)"><i class="fas fa-gem"></i></div>
        <div>
          <div class="svc-stat-label">Status</div>
          <div class="svc-stat-value" style="font-size:1.2rem;">Active</div>
        </div>
      </div>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h3>All Services</h3>
            <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
                <span style="font-size:0.78rem;color:var(--text-muted);" th:text="${services.size()} + ' services'"></span>
                <div class="view-toggle">
                  <button class="view-btn active" id="btnGrid" onclick="setSvcView('grid')" title="Card View"><i class="fas fa-th"></i></button>
                  <button class="view-btn" id="btnTable" onclick="setSvcView('table')" title="Table View"><i class="fas fa-list"></i></button>
                </div>
                <a th:href="@{/services/add}" class="btn btn-rose"><i class="fas fa-plus"></i> Add New Service</a>
            </div>
        </div>
        <div class="card-body">
            
            <!-- Card Grid View -->
            <div id="svcCardGrid" class="svc-card-grid">
                <div class="svc-thumb-card" th:each="service : ${services}">
                  <div class="svc-thumb-img">
                    <img th:if="${service.imageUrl != null and service.imageUrl != ''}" th:src="@{${service.imageUrl}}" th:alt="${service.name}">
                    <i th:unless="${service.imageUrl != null and service.imageUrl != ''}" class="fas fa-spa"></i>
                  </div>
                  <div class="svc-thumb-body">
                    <div class="svc-thumb-name" th:title="${service.name}" th:text="${service.name}">Service Name</div>
                    <div class="svc-thumb-price" th:text="${'LKR ' + service.price}">LKR 0</div>
                    <div class="svc-thumb-desc" th:text="${service.category + ' | ' + service.duration + ' mins'}">Category | Duration</div>
                    <div class="svc-thumb-actions">
                      <a th:href="@{/services/edit/{id}(id=${service.serviceId})}" class="btn btn-sm" style="background:var(--rose-soft);color:var(--rose);"><i class="fas fa-edit"></i></a>
                      <a th:href="@{/services/delete/{id}(id=${service.serviceId})}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this service?')"><i class="fas fa-trash"></i></a>
                    </div>
                  </div>
                </div>
                
                <div th:if="${#lists.isEmpty(services)}" style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 3rem;">
                    <i class="fas fa-spa" style="font-size: 3rem; color: var(--border2); margin-bottom: 1rem; display: block;"></i>
                    No services found. Click "Add New Service" to create one.
                </div>
            </div>

            <!-- Table View -->
            <div id="svcTableView" style="display:none;">
                <div class="table-wrap mt-3">
                    <table>
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Service ID</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Duration (mins)</th>
                                <th>Price (LKR)</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="service : ${services}">
                                <td>
                                    <img th:if="${service.imageUrl != null and service.imageUrl != ''}" th:src="@{${service.imageUrl}}" style="width:42px;height:42px;object-fit:cover;border-radius:8px;border:1px solid var(--border);" alt="Service Image">
                                    <div th:unless="${service.imageUrl != null and service.imageUrl != ''}" style="width:42px;height:42px;border-radius:8px;background:var(--rose-soft);display:flex;align-items:center;justify-content:center;">
                                        <i class="fas fa-spa" style="color:var(--rose);"></i>
                                    </div>
                                </td>
                                <td style="color:var(--text-muted);font-size:0.8rem" th:text="${'#' + service.serviceId}">ID</td>
                                <td th:text="${service.name}">Name</td>
                                <td>
                                    <span class="pill pill-gold" th:if="${service.category == 'Hair'}" th:text="${service.category}"></span>
                                    <span class="pill pill-rose" th:if="${service.category == 'Skin'}" th:text="${service.category}"></span>
                                    <span class="pill pill-green" th:if="${service.category == 'Nail'}" th:text="${service.category}"></span>
                                    <span class="pill pill-blue" th:if="${service.category != 'Hair' and service.category != 'Skin' and service.category != 'Nail'}" th:text="${service.category}"></span>
                                </td>
                                <td th:text="${service.duration}">Duration</td>
                                <td style="color:var(--rose);font-weight:600;" th:text="${'LKR ' + service.price}">Price</td>
                                <td>
                                    <div class="btn-group">
                                        <a th:href="@{/services/edit/{id}(id=${service.serviceId})}" class="btn btn-gold btn-sm"><i class="fas fa-edit"></i> Edit</a>
                                        <a th:href="@{/services/delete/{id}(id=${service.serviceId})}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this service?')"><i class="fas fa-trash"></i></a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script>
function setSvcView(mode){
  document.getElementById('svcCardGrid').style.display=mode==='grid'?'grid':'none';
  document.getElementById('svcTableView').style.display=mode==='table'?'block':'none';
  document.getElementById('btnGrid').classList.toggle('active',mode==='grid');
  document.getElementById('btnTable').classList.toggle('active',mode==='table');
}
</script>
</th:block>

</body>
</html>
