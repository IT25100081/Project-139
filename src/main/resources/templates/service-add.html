<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/admin-layout}">
<head>
    <title>Add New Service</title>
</head>
<body>

<div layout:fragment="content">
    <div class="svc-top-row">
      <!-- Add Form -->
      <div class="card" style="margin-bottom:0;">
        <div class="card-header">
          <h3><i class="fas fa-plus-circle" style="color:var(--rose);margin-right:0.45rem;font-size:0.9rem;"></i>Add New Service</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/services/add}" th:object="${serviceDTO}" method="post" enctype="multipart/form-data" id="svcForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Service ID <span style="color:var(--rose)">*</span></label>
                        <input type="text" class="form-control" th:field="*{serviceId}" placeholder="e.g. S004" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Service Name <span style="color:var(--rose)">*</span></label>
                        <input type="text" class="form-control" th:field="*{name}" id="svcName" placeholder="e.g. Deep Hair Treatment" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Category <span style="color:var(--rose)">*</span></label>
                        <select class="form-control" th:field="*{category}">
                            <option value="Hair">Hair</option>
                            <option value="Skin">Skin</option>
                            <option value="Nail">Nail</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Duration (mins) <span style="color:var(--rose)">*</span></label>
                        <input type="number" class="form-control" th:field="*{duration}" required min="1" placeholder="e.g. 45">
                    </div>
                    
                    <div class="form-group form-full">
                        <label>Price (LKR) <span style="color:var(--rose)">*</span></label>
                        <input type="number" step="0.01" class="form-control" th:field="*{price}" id="svcPrice" required min="0" placeholder="0.00">
                    </div>
                    
                    <div class="form-group form-full">
                        <label>Service Image</label>
                        <div class="dropzone" id="imageDropzone"
                          onclick="document.getElementById('imageFile').click()"
                          ondragover="event.preventDefault();this.style.borderColor='var(--rose)'"
                          ondragleave="this.style.borderColor='var(--border2)'"
                          ondrop="handleDrop(event)">
                          <div id="dropzoneContent">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Click or drag & drop an image here</p>
                            <small>JPG, PNG, WEBP · Max 5MB</small>
                          </div>
                          <img id="imagePreview" src="" alt="" style="display:none;max-height:110px;border-radius:8px;margin:0 auto;object-fit:cover;">
                        </div>
                        <input type="file" id="imageFile" name="imageFile" accept="image/*" style="display:none" onchange="previewImage(this)">
                    </div>
                </div>
                
                <div class="btn-group mt-3" style="justify-content: flex-end; width: 100%;">
                    <a th:href="@{/services}" class="btn btn-outline"><i class="fas fa-undo"></i> Cancel</a>
                    <button type="submit" class="btn btn-rose"><i class="fas fa-plus"></i> Add Service</button>
                </div>
            </form>
        </div>
      </div>

      <!-- Live Preview -->
      <div>
        <div style="font-size:0.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.75rem;">
          Live Preview
        </div>
        <div class="preview-card" id="svcPreviewCard">
          <div class="preview-card-img" id="prevImgWrap">
            <i class="fas fa-spa" id="prevImgPlaceholder"></i>
            <img id="prevImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;">
          </div>
          <div class="preview-card-body">
            <div class="preview-card-name" id="prevName">Service Name</div>
            <div class="preview-card-price" id="prevPrice">LKR —</div>
            <div class="preview-card-desc" id="prevDesc">A new luxurious service for our clients.</div>
            <div class="preview-badge"><i class="fas fa-check-circle"></i> Active Service</div>
          </div>
        </div>
      </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script>
function previewImage(input){
  if(!input.files||!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('imagePreview').src=e.target.result;
    document.getElementById('imagePreview').style.display='block';
    document.getElementById('dropzoneContent').style.display='none';
    
    // Update live preview
    document.getElementById('prevImg').src=e.target.result;
    document.getElementById('prevImg').style.display='block';
    document.getElementById('prevImgPlaceholder').style.display='none';
  };
  reader.readAsDataURL(input.files[0]);
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('imageDropzone').style.borderColor='var(--border2)';
  const file=e.dataTransfer.files[0];
  if(file&&file.type.startsWith('image/')){
    const dt=new DataTransfer(); dt.items.add(file);
    document.getElementById('imageFile').files=dt.files;
    previewImage(document.getElementById('imageFile'));
  }
}

// Live preview update on input
['svcName','svcPrice'].forEach(id=>{
  setTimeout(()=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.addEventListener('input',()=>{
      if(id==='svcName') document.getElementById('prevName').textContent=el.value||'Service Name';
      if(id==='svcPrice') document.getElementById('prevPrice').textContent=el.value?'LKR '+parseFloat(el.value).toLocaleString():'LKR —';
    });
  },100);
});
</script>
</th:block>

</body>
</html>
